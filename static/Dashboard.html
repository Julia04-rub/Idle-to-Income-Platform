<!DOCTYPE html>
<html>
<head>
  <title>I² Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>I² Dashboard</h1>
  <button class="logout-btn" onclick="logout()">🔓</button>
</div>

<div class="container">
  <div class="card">
    <h2>Available Tasks</h2>
    <div id="taskList"></div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>My Tasks</h2>
      <div id="myTasks"></div>
    </div>

    <div class="card">
      <h2>Total Income</h2>
      <div id="income" class="income">$0</div>
    </div>

    <div class="card">
      <h2>Completed Tasks</h2>
      <div id="completedTasks"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
loadTasks();
loadEarnings();
</script>

</body>
</html>
